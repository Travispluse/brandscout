name: Daily blog automation

on:
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional topic seed"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TEXT_MODEL: ${{ vars.OPENAI_TEXT_MODEL || 'gpt-5.2' }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-1.5' }}
          TOPIC: ${{ inputs.topic }}
        run: |
          if [ -n "$TOPIC" ]; then
            node scripts/generate-daily-blog.mjs --topic="$TOPIC"
          else
            node scripts/generate-daily-blog.mjs
          fi

      - name: Verify build
        run: npm run build

      - name: Commit generated content
        run: |
          if [ -z "$(git status --porcelain content/blog public/blog)" ]; then
            echo "No new blog content generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog public/blog
          git commit -m "chore: publish daily BrandScout blog post"
          git push
